name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    name: Deploy Backend to Cloud Run
    runs-on: ubuntu-latest
    if: |
      contains(toJson(github.event.commits.*.modified), 'web/backend') ||
      contains(toJson(github.event.commits.*.added), 'web/backend') ||
      contains(toJson(github.event.commits.*.modified), 'cloudbuild.yaml') ||
      contains(toJson(github.event.commits.*.modified), 'pyproject.toml') ||
      contains(toJson(github.event.commits.*.modified), 'judgecalib')
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: judgecalibrator-app

      - name: Build and push image
        run: gcloud builds submit --config cloudbuild.yaml --project judgecalibrator-app

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy judgecalibrator-backend \
            --image gcr.io/judgecalibrator-app/judgecalibrator-backend \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated \
            --memory 1Gi \
            --timeout 300 \
            --set-env-vars "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }},ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }},GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" \
            --project judgecalibrator-app

  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    if: |
      contains(toJson(github.event.commits.*.modified), 'web/frontend') ||
      contains(toJson(github.event.commits.*.added), 'web/frontend')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci
        working-directory: web/frontend

      - name: Deploy to Vercel
        run: npx vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }} --scope=${{ secrets.VERCEL_TEAM_SLUG }}
        working-directory: web/frontend
